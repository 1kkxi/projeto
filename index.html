<!doctype html>
<html lang="en">
  <!-- document element ou root , também conhecido como pai ou parent -->
  <head>
    <!-- tags filhos ou nós (node); responsável ajustar configurações do documento -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      nhref="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <meta charset="UTF-8" />
    <!-- carácteres que serão usados no documento -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <!-- compatibilidade com browsers antigo -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- faz com que a viewport se adapte com o tamanho da janela -->
    <title>Projeto</title>
    <link rel="icon" type="image/x-icon" href="./assets/shelf.ico" />
    <link rel="stylesheet" href="./style.css" />
    <!-- puxando referencia da onde está o css que será usado. "./ se refere neste local" -->
  </head>
  <body>
    <!-- tags filhos ou nós(node) -->

    <div id="container">
      <div id="profile">
        <!-- prettier-ignore --><img src="./assets/avatar-dark.jpg" alt="red petals tree with a bridge in a red background"/>

        <p>victor.alexandrin</p>
      </div>

      <div id="switch">

        <span></span>
      </div>

      <ul>
        <li>
          <!-- prettier-ignore --><a href="https://github.com/1kkxi" target="_blank"><ion-icon name="logo-github"></ion-icon> Github </a>
        </li>

        <li>
          <!-- prettier-ignore --><a href="#" target="_blank"><ion-icon name="logo-linkedin"></ion-icon> LinkedIn </a>
        </li>

        <!-- <li>
          <a href="#" target="_blank"><ion-icon name="color-palette"></ion-icon> Artist Portfolio </a>
        </li> -->
      </ul>

      <div id="social-links">
        <a href="https://www.instagram.com/eokksh/" target="_blank">
          <ion-icon name="logo-instagram"></ion-icon>
        </a>
      </div>

      <footer>
        feito com ❤️ pela
        <a href="https://app.rocketseat.com.br" target="_blank">Rocketseat</a>
      </footer>
    </div>

    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>

    <script src="./script.js"></script>
  </body>
</html>
